{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-body p-5 text-center">
                    <h2 class="mb-4">Подтвердите ваш Email</h2>
                    <div class="alert alert-info">
                        <p class="mb-3">Мы отправили вам email с ссылкой для подтверждения.</p>
                        <p class="mb-3">Перейдите по ссылке в письме чтобы завершить регистрацию.</p>
                        <p class="small text-muted mb-0">
                            Если вы не видите письмо в основном inbox, проверьте папку спам.
                        </p>
                    </div>
                    <div class="mt-4">
                        <a href="{% url 'mail_flow:main' %}" class="btn btn-primary me-2">На главную</a>
                        <a href="{% url 'users:login' %}" class="btn btn-outline-secondary">На страницу входа</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
