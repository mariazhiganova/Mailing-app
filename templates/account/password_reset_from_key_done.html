{% extends 'base.html' %}

{% block page_header %}
<div class="page-header py-4">
    <div class="container">
        <h1>Пароль изменен</h1>
    </div>
</div>
{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-body p-5 text-center">
                <h2 class="mb-4">Пароль успешно изменен!</h2>
                <div class="alert alert-success">
                    <p class="mb-3">Ваш пароль был успешно изменен.</p>
                    <p class="mb-0">Теперь вы можете войти с новым паролем.</p>
                </div>
                <div class="mt-4">
                    <a href="{% url 'users:login' %}" class="btn btn-primary me-2">Войти в аккаунт</a>
                    <a href="{% url 'mail_flow:main' %}" class="btn btn-outline-secondary">На главную</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
