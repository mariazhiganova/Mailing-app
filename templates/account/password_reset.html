{% extends 'base.html' %}

{% block page_header %}
<div class="page-header py-4">
    <div class="container">
        <h1>Восстановление пароля</h1>
    </div>
</div>
{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-body p-5">
                <h2 class="mb-4">Восстановить пароль</h2>
                <p class="text-muted mb-4">Введите ваш email и мы отправим ссылку для сброса пароля</p>

                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="{{ form.email.id_for_label }}" class="form-label">Email</label>
                        {{ form.email }}
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Отправить ссылку</button>
                </form>

                <div class="text-center mt-3">
                    <a href="{% url 'users:login' %}">Вернуться к входу</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
