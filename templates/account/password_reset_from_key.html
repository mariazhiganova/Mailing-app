{% extends 'base.html' %}

{% block page_header %}
<div class="page-header py-4">
    <div class="container">
        <h1>Создание нового пароля</h1>
    </div>
</div>
{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-body p-5">
                <h2 class="mb-4">Введите новый пароль</h2>

                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="{{ form.password1.id_for_label }}" class="form-label">Новый пароль</label>
                        {{ form.password1 }}
                    </div>

                    <div class="mb-3">
                        <label for="{{ form.password2.id_for_label }}" class="form-label">Подтвердите пароль</label>
                        {{ form.password2 }}
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Сменить пароль</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
