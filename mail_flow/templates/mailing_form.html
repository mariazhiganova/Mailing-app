{% extends 'base.html' %}
{% block page_header %}
<div class="page-header py-4">
    <div class="container">
        <h1>
            {% if object %}
            Изменение рассылки
            {% else %}
            Добавление новой рассылки
            {% endif %}
        </h1>
    </div>
</div>
{% endblock %}

{% block content %}
<div class="container">

    <div class="row">
        <div class="col-4">
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary">
                    {% if object %}
                    Сохранить изменения
                    {% else %}
                    Добавить
                    {% endif %}
                </button>
                <a href="#" class="btn btn-secondary">Отмена</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
