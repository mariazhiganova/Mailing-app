{% extends 'base.html' %}

{% block page_header %}
<div class="page-header py-4">
    <div class="container">
        <h1>Регистрация</h1>
    </div>
</div>
{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-3 ms-3 mt-2">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
        </form>
        <p class="mt-3 text-center">
            Уже есть аккаунт? <a href="{% url 'users:login' %}">Войти</a>
        </p>
    </div>
</div>
{% endblock %}
