{% extends 'base.html' %}

{% block page_header %}
<div class="page-header py-4">
    <div class="container">
        <h1>Вход</h1>
    </div>
</div>
{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-3 ms-3 mt-2">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="d-grid">
                <button type="submit" class="btn btn-primary">Войти</button>
            </div>
        </form>
        <p class="mt-3 text-center">
            Нет аккаунта? <a href="{% url 'users:register' %}">Зарегистрируйтесь</a>
        </p>

    </div>
</div>
{% endblock %}
